<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link rel="stylesheet" href="TaskManager.css">
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <nav>
      <button class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Tasks</button>
    </nav>
    <div class="logout">
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Log Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search" placeholder="Search tasks...">
      </div>
      <div class="topbar-right">
        <button class="icon-btn"><span class="dot"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></button>
        <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg></button>
        <div class="profile">
          <div class="pic">R</div>
          <div><div class="nm">Ryan</div></div>
        </div>
      </div>
    </div>

    <div class="page-head">
      <div>
        <h1>Tasks</h1>
        <div class="tabs">
          <button class="tab active">List</button>
          <button class="tab">Grid</button>
          <button class="tab">Calendar</button>
        </div>
      </div>
      <div class="head-actions">
        <div class="pill-select">Show: All <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="6 9 12 15 18 9"/></svg></div>
        <button class="add-btn" id="toggleAdd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add New</button>
      </div>
    </div>

    <div class="table">
      <div class="thead">
        <span class="h-agenda">Task</span>
        <span class="h-status">Status</span>
        <span class="h-date">Due Date</span>
        <span class="h-time">Priority</span>
        <span class="h-points">Notes</span>
        <span class="h-assignees">Assignees</span>
      </div>

      <!-- inline add -->
      <div class="add-row hidden" id="addRow">
        <input type="text" id="i-title" placeholder="Task name…">
        <select id="i-status">
          <option value="upcoming">Upcoming</option>
          <option value="review">In Review</option>
          <option value="published">Published</option>
          <option value="overdue">Overdue</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <input type="date" id="i-date" class="a-date">
        <select id="i-priority" class="a-time"><option>High</option><option selected>Medium</option><option>Low</option></select>
        <input type="text" id="i-notes" class="a-points" placeholder="Notes…">
        <button class="save" id="saveTask">Save</button>
      </div>

      <div id="list"></div>

      <div class="empty hidden" id="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <p>No tasks yet. Hit <strong>Add New</strong> to create your first one.</p>
      </div>
    </div>
  </main>

  <script src="TaskManager.js"></script>
</body>
</html>
